<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>간편 영상 편집기</title>
<style>
  :root { --bg:#0f1420; --card:#1a2233; --line:#2a3550; --text:#e8ecf5; --sub:#93a0b8; --accent:#ff4757; --ok:#2ecc71; }
  * { box-sizing:border-box; margin:0; }
  body { background:var(--bg); color:var(--text); font-family:'Malgun Gothic',sans-serif; padding:24px; }
  .wrap { max-width:1080px; margin:0 auto; }
  h1 { font-size:20px; margin-bottom:4px; }
  .sub { color:var(--sub); font-size:13px; margin-bottom:18px; }
  a.back { color:#6ab0ff; font-size:13px; text-decoration:none; }
  .card { background:var(--card); border:1px solid var(--line); border-radius:12px; padding:16px; margin-bottom:14px; }
  label { display:block; font-size:13px; color:var(--sub); margin:10px 0 6px; }
  input[type=text], textarea, select { width:100%; background:#111827; border:1px solid var(--line); border-radius:8px; color:var(--text); padding:9px 11px; font-size:14px; font-family:inherit; }
  input[type=file] { width:100%; background:#111827; border:1px dashed var(--line); border-radius:8px; color:var(--sub); padding:12px; font-size:13px; cursor:pointer; }
  .timeline { display:flex; flex-direction:column; gap:10px; }
  .clip { display:flex; gap:14px; background:#141b2b; border:1px solid var(--line); border-radius:10px; padding:12px; align-items:flex-start; }
  .clip.dragging { opacity:.4; }
  .clip.dragover { border-color:var(--accent); }
  .clip video { width:200px; max-height:150px; border-radius:8px; background:#000; flex-shrink:0; }
  .clip .body { flex:1; min-width:0; }
  .clip h4 { font-size:13px; font-weight:normal; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .grip { cursor:grab; color:var(--sub); font-size:18px; padding:4px 2px; user-select:none; }
  .range-row { display:flex; align-items:center; gap:8px; margin-top:8px; font-size:12px; color:var(--sub); }
  .range-row input[type=range] { flex:1; accent-color:var(--accent); }
  .rangeinfo { font-size:12px; color:var(--ok); margin-top:4px; }
  .btns { display:flex; gap:6px; margin-top:10px; flex-wrap:wrap; }
  .btns button { background:#111827; border:1px solid var(--line); border-radius:7px; color:var(--text); padding:6px 10px; font-size:12px; cursor:pointer; font-family:inherit; }
  .btns button:hover { border-color:var(--accent); }
  .footer { position:sticky; bottom:0; background:var(--card); border:1px solid var(--line); border-radius:12px; padding:14px 16px; display:flex; align-items:center; gap:14px; flex-wrap:wrap; }
  .total { font-size:14px; }
  .total b { color:var(--ok); }
  .go { padding:11px 22px; background:var(--accent); border:0; border-radius:9px; color:#fff; font-size:14px; font-weight:bold; cursor:pointer; font-family:inherit; }
  .go:disabled { opacity:.5; cursor:default; }
  .go.green { background:var(--ok); color:#08130c; }
  .bar { flex:1; min-width:120px; height:8px; background:#111827; border-radius:4px; overflow:hidden; }
  .bar i { display:block; height:100%; background:var(--ok); transition:width .5s; }
  .err { color:#ff6b6b; font-size:13px; }
  video.result { width:100%; max-height:440px; border-radius:8px; background:#000; margin-top:10px; }
  .hint { font-size:12px; color:var(--sub); line-height:1.8; }
  .link { color:#6ab0ff; }
  .row { display:flex; gap:12px; flex-wrap:wrap; }
  .row > div { flex:1; min-width:180px; }
</style>
</head>
<body>
<div class="wrap">
  <a class="back" href="/">← 메인으로</a>
  <h1>✂️ 간편 영상 편집기</h1>
  <div class="sub">클립을 자르고(슬라이더), 분할하고(재생 위치에서), 드래그로 순서를 바꾼 뒤 렌더링하세요.</div>

  <div class="card">
    <label>클립 추가 (영상 파일 여러 개 선택 가능 — 타임라인 끝에 추가됩니다)</label>
    <input type="file" id="addfiles" multiple accept="video/*">
    <div class="hint" style="margin-top:8px">
      💡 <b>자르기</b>: 슬라이더 두 개로 사용할 구간만 남기기 ·
      <b>분할</b>: 미리보기를 원하는 위치에 멈추고 "현재 위치에서 분할" ·
      <b>순서</b>: ⠿ 를 잡고 드래그 (또는 ▲▼ 버튼)
    </div>
  </div>

  <div class="timeline" id="timeline"></div>

  <div class="footer">
    <div class="total">총 길이 <b id="total">0.0초</b> · 조각 <b id="count">0</b>개</div>
    <div class="bar" id="pbar" style="display:none"><i id="pfill" style="width:0%"></i></div>
    <button class="go" id="render" onclick="render()">🎬 렌더링</button>
    <span class="err" id="err"></span>
  </div>

  <div class="card" id="resultbox" style="display:none">
    <h1 style="font-size:16px">✅ 렌더링 완료</h1>
    <video class="result" id="resultvideo" controls></video>
    <div id="applybox" style="display:none; margin-top:12px">
      <button class="go green" onclick="applyToJob()">이 편집본을 원본 작업에 적용 (기존 업로드 화면 사용)</button>
      <span id="applied" style="color:var(--ok); font-size:13px"></span>
    </div>
    <div id="uploadbox" style="display:none">
      <label>업로드 제목</label><input type="text" id="uptitle">
      <label>설명</label><textarea id="updesc" rows="2"></textarea>
      <div class="row" style="margin-top:10px; align-items:center">
        <div><select id="upprivacy">
          <option value="private">비공개 (업로드 후 직접 공개)</option>
          <option value="unlisted">일부공개</option>
          <option value="public">공개</option>
        </select></div>
        <div id="upstate"><button class="go green" onclick="doUpload()">📤 YouTube 업로드</button></div>
      </div>
    </div>
  </div>
</div>

<script>
const qs = new URLSearchParams(location.search);
let SID = null, CLIPS = {}, items = [], seq = 0, dragIdx = null;

const esc = s => String(s ?? "").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const fmt = t => `${Number(t).toFixed(1)}초`;

async function init() {
  const r = await fetch("/api/editor/sessions", {method:"POST", headers:{"Content-Type":"application/json"},
    body: JSON.stringify({job_id: qs.get("job") || null})});
  if (!r.ok) { document.getElementById("err").textContent = (await r.json()).detail || "세션 생성 실패"; return; }
  const s = await r.json();
  SID = s.id;
  s.clips.forEach(c => { CLIPS[c.id] = c; items.push({uid: seq++, clip_id: c.id, start: 0, end: c.duration}); });
  if (s.job_id) document.getElementById("applybox").style.display = "block";
  document.getElementById("uploadbox").style.display = "block";
  draw();
}

document.getElementById("addfiles").onchange = async e => {
  const fd = new FormData();
  for (const f of e.target.files) fd.append("files", f);
  const r = await fetch(`/api/editor/sessions/${SID}/clips`, {method:"POST", body: fd});
  if (!r.ok) return alert((await r.json()).detail || "업로드 실패");
  const s = await r.json();
  s.clips.forEach(c => {
    if (!CLIPS[c.id]) { CLIPS[c.id] = c; items.push({uid: seq++, clip_id: c.id, start: 0, end: c.duration}); }
  });
  e.target.value = "";
  draw();
};

function draw() {
  const tl = document.getElementById("timeline");
  tl.innerHTML = items.map((it, i) => {
    const c = CLIPS[it.clip_id];
    return `<div class="clip" draggable="true" data-i="${i}">
      <div class="grip" title="드래그로 이동">⠿</div>
      <video preload="metadata" controls muted src="/api/editor/sessions/${SID}/clips/${c.id}/video#t=${it.start}"></video>
      <div class="body">
        <h4>${i + 1}. ${esc(c.name)} <span style="color:var(--sub)">(원본 ${fmt(c.duration)})</span></h4>
        <div class="range-row">시작 <input type="range" min="0" max="${c.duration}" step="0.1" value="${it.start}"
          oninput="setRange(${i}, 'start', this.value)"></div>
        <div class="range-row">끝&nbsp;&nbsp; <input type="range" min="0" max="${c.duration}" step="0.1" value="${it.end}"
          oninput="setRange(${i}, 'end', this.value)"></div>
        <div class="rangeinfo" id="ri-${i}">${fmt(it.start)} ~ ${fmt(it.end)} 사용 (${fmt(it.end - it.start)})</div>
        <div class="btns">
          <button onclick="move(${i}, -1)">▲ 위로</button>
          <button onclick="move(${i}, 1)">▼ 아래로</button>
          <button onclick="split(${i}, this)">✂ 현재 위치에서 분할</button>
          <button onclick="dup(${i})">⧉ 복제</button>
          <button onclick="del(${i})">🗑 삭제</button>
        </div>
      </div>
    </div>`;
  }).join("");
  tl.querySelectorAll(".clip").forEach(el => {
    el.addEventListener("dragstart", () => { dragIdx = +el.dataset.i; el.classList.add("dragging"); });
    el.addEventListener("dragend", () => el.classList.remove("dragging"));
    el.addEventListener("dragover", e => { e.preventDefault(); el.classList.add("dragover"); });
    el.addEventListener("dragleave", () => el.classList.remove("dragover"));
    el.addEventListener("drop", e => {
      e.preventDefault(); el.classList.remove("dragover");
      const to = +el.dataset.i;
      if (dragIdx === null || dragIdx === to) return;
      items.splice(to, 0, items.splice(dragIdx, 1)[0]);
      dragIdx = null; draw();
    });
  });
  updateTotal();
}

function setRange(i, key, v) {
  v = parseFloat(v);
  const it = items[i];
  if (key === "start") it.start = Math.min(v, it.end - 0.1);
  else it.end = Math.max(v, it.start + 0.1);
  document.getElementById(`ri-${i}`).textContent = `${fmt(it.start)} ~ ${fmt(it.end)} 사용 (${fmt(it.end - it.start)})`;
  updateTotal();
}

function move(i, d) {
  const j = i + d;
  if (j < 0 || j >= items.length) return;
  [items[i], items[j]] = [items[j], items[i]];
  draw();
}

function split(i, btn) {
  const video = btn.closest(".clip").querySelector("video");
  const it = items[i];
  let t = video.currentTime;
  if (!(t > it.start + 0.2 && t < it.end - 0.2)) t = (it.start + it.end) / 2;
  items.splice(i + 1, 0, {uid: seq++, clip_id: it.clip_id, start: Math.round(t * 10) / 10, end: it.end});
  it.end = Math.round(t * 10) / 10;
  draw();
}

function dup(i) { items.splice(i + 1, 0, {...items[i], uid: seq++}); draw(); }
function del(i) { items.splice(i, 1); draw(); }

function updateTotal() {
  document.getElementById("total").textContent = fmt(items.reduce((a, it) => a + (it.end - it.start), 0));
  document.getElementById("count").textContent = items.length;
}

async function render() {
  if (!items.length) return alert("타임라인이 비어 있습니다");
  document.getElementById("err").textContent = "";
  document.getElementById("render").disabled = true;
  document.getElementById("pbar").style.display = "block";
  const timeline = items.map(it => ({clip_id: it.clip_id, start: it.start, end: it.end}));
  const r = await fetch(`/api/editor/sessions/${SID}/render`, {method:"POST",
    headers:{"Content-Type":"application/json"}, body: JSON.stringify({timeline})});
  if (!r.ok) { document.getElementById("err").textContent = (await r.json()).detail; document.getElementById("render").disabled = false; return; }
  poll();
}

async function poll() {
  const s = await (await fetch(`/api/editor/sessions/${SID}`)).json();
  document.getElementById("pfill").style.width = s.progress + "%";
  if (s.status === "rendering") return setTimeout(poll, 1500);
  document.getElementById("render").disabled = false;
  document.getElementById("pbar").style.display = "none";
  if (s.status === "error") { document.getElementById("err").textContent = s.error; return; }
  if (s.has_result) {
    document.getElementById("resultbox").style.display = "block";
    const v = document.getElementById("resultvideo");
    v.src = `/api/editor/sessions/${SID}/result?t=` + Date.now();
    v.scrollIntoView({behavior:"smooth"});
  }
  if (s.upload_status === "uploaded")
    document.getElementById("upstate").innerHTML = `<a class="link" href="${s.youtube_url}" target="_blank">✅ 업로드 완료 — 영상 보기</a>`;
  else if (s.upload_status === "uploading")
    { document.getElementById("upstate").innerHTML = `⏳ 업로드 중...`; setTimeout(poll, 2500); }
  else if (s.upload_status === "upload_error")
    document.getElementById("err").textContent = s.error;
}

async function applyToJob() {
  const r = await fetch(`/api/editor/sessions/${SID}/apply`, {method:"POST"});
  if (!r.ok) return alert((await r.json()).detail);
  document.getElementById("applied").textContent = " ✅ 적용 완료 — 메인 화면에서 업로드하세요";
}

async function doUpload() {
  const title = document.getElementById("uptitle").value.trim() || "편집 영상";
  const privacy = document.getElementById("upprivacy").value;
  const names = {private:"비공개", unlisted:"일부공개", public:"공개"};
  if (!confirm(`"${title}"\n공개 설정: ${names[privacy]}\n\nYouTube에 업로드할까요?`)) return;
  const r = await fetch(`/api/editor/sessions/${SID}/upload`, {method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({title, privacy, description: document.getElementById("updesc").value})});
  if (!r.ok) return alert((await r.json()).detail);
  poll();
}

init();
</script>
</body>
</html>
