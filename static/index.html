<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>유튜브 영상 자동 제작</title>
<style>
  :root { --bg:#0f1420; --card:#1a2233; --line:#2a3550; --text:#e8ecf5; --sub:#93a0b8; --accent:#ff4757; --ok:#2ecc71; }
  * { box-sizing:border-box; margin:0; }
  body { background:var(--bg); color:var(--text); font-family:'Malgun Gothic',sans-serif; padding:24px; }
  .wrap { max-width:960px; margin:0 auto; }
  h1 { font-size:22px; margin-bottom:4px; }
  .sub { color:var(--sub); font-size:13px; margin-bottom:20px; }
  .card { background:var(--card); border:1px solid var(--line); border-radius:12px; padding:20px; margin-bottom:16px; }
  label { display:block; font-size:13px; color:var(--sub); margin:14px 0 6px; }
  input[type=text], textarea, select { width:100%; background:#111827; border:1px solid var(--line); border-radius:8px; color:var(--text); padding:10px 12px; font-size:14px; font-family:inherit; }
  textarea { resize:vertical; }
  .row { display:flex; gap:12px; flex-wrap:wrap; }
  .row > div { flex:1; min-width:200px; }
  .seg { display:flex; gap:8px; }
  .seg button { flex:1; padding:10px; background:#111827; border:1px solid var(--line); border-radius:8px; color:var(--sub); cursor:pointer; font-family:inherit; font-size:14px; }
  .seg button.on { background:var(--accent); border-color:var(--accent); color:#fff; font-weight:bold; }
  .go { width:100%; margin-top:18px; padding:14px; background:var(--accent); border:0; border-radius:10px; color:#fff; font-size:16px; font-weight:bold; cursor:pointer; font-family:inherit; }
  .go:disabled { opacity:.5; cursor:default; }
  .job h3 { font-size:15px; margin-bottom:8px; }
  .bar { height:8px; background:#111827; border-radius:4px; overflow:hidden; margin:8px 0; }
  .bar i { display:block; height:100%; background:var(--ok); transition:width .5s; }
  .stage { font-size:13px; color:var(--sub); }
  .log { background:#0b101c; border-radius:8px; padding:10px; font-size:12px; color:var(--sub); max-height:140px; overflow-y:auto; margin-top:10px; white-space:pre-wrap; }
  .err { color:#ff6b6b; font-size:13px; margin-top:8px; }
  video { width:100%; max-height:420px; border-radius:8px; margin-top:12px; background:#000; }
  .upbox { border-top:1px solid var(--line); margin-top:14px; padding-top:14px; }
  .btn2 { padding:10px 18px; background:var(--ok); border:0; border-radius:8px; color:#08130c; font-weight:bold; cursor:pointer; font-family:inherit; font-size:14px; }
  .link { color:#6ab0ff; }
  .badge { display:inline-block; font-size:11px; padding:2px 8px; border-radius:10px; background:#111827; color:var(--sub); margin-left:6px; }
  input[type=file] { width:100%; background:#111827; border:1px dashed var(--line); border-radius:8px; color:var(--sub); padding:12px; font-size:13px; font-family:inherit; cursor:pointer; }
  .filelist { font-size:12px; color:var(--sub); margin-top:6px; line-height:1.7; }
  .filelist b { color:var(--text); font-weight:normal; }
</style>
</head>
<body>
<div class="wrap">
  <h1>🎬 유튜브 영상 자동 제작 · 배포</h1>
  <div class="sub">주제와 옵션을 입력하면 대본 → 나레이션 → 영상 → 썸네일까지 자동 생성하고, 확인 후 유튜브에 업로드합니다.
    <a class="link" href="/edit">✂️ 간편 편집기 열기</a></div>

  <div class="card">
    <label>영상 주제 *</label>
    <textarea id="topic" rows="2" placeholder="예: 2026년 하반기 국내 여행지 추천 5곳"></textarea>

    <div class="row">
      <div>
        <label>영상 형식</label>
        <div class="seg" id="fmt">
          <button data-v="long" class="on">롱폼 (16:9)</button>
          <button data-v="short">숏폼 (9:16)</button>
        </div>
      </div>
      <div>
        <label>구성 방식</label>
        <select id="style">
          <optgroup label="스톡영상 기반">
            <option value="realistic">실사 (스톡영상 + 자막)</option>
            <option value="documentary">다큐/스토리텔링 (시네마틱)</option>
            <option value="news">뉴스 클립 (헤드라인 자막바)</option>
            <option value="ranking">랭킹 Top N (카운트다운)</option>
            <option value="tutorial">튜토리얼 (단계별 STEP)</option>
          </optgroup>
          <optgroup label="그래픽 기반">
            <option value="infographic">인포그래픽 (요약 슬라이드)</option>
            <option value="cardnews">카드뉴스 (텍스트 카드)</option>
            <option value="quote">명언/감성 (문구 중심)</option>
          </optgroup>
        </select>
      </div>
      <div>
        <label>나레이션 음성</label>
        <select id="voice">
          <option value="ko-KR-SunHiNeural">선히 (여성)</option>
          <option value="ko-KR-InJoonNeural">인준 (남성)</option>
          <option value="ko-KR-HyunsuMultilingualNeural">현수 (남성)</option>
        </select>
      </div>
    </div>

    <div class="row">
      <div>
        <label>자막 폰트</label>
        <select id="font"></select>
      </div>
      <div>
        <label>자막 크기</label>
        <select id="capsize">
          <option value="normal">보통</option>
          <option value="large">크게</option>
          <option value="small">작게</option>
        </select>
      </div>
      <div>
        <label>자막 스타일</label>
        <select id="capstyle">
          <option value="box">반투명 박스</option>
          <option value="outline">외곽선 (예능 자막)</option>
          <option value="shadow">그림자</option>
        </select>
      </div>
      <div>
        <label>자막 색상</label>
        <input type="color" id="capcolor" value="#ffffff" style="width:100%; height:38px; background:#111827; border:1px solid var(--line); border-radius:8px; cursor:pointer">
      </div>
    </div>

    <label>참고 영상 URL (선택, 한 줄에 하나씩 — 말투·구성을 참고합니다)</label>
    <textarea id="refs" rows="2" placeholder="https://www.youtube.com/watch?v=..."></textarea>

    <label>소스 자료 텍스트 (선택 — 원고·기사·정보를 붙여넣으면 대본의 최우선 근거로 사용됩니다)</label>
    <textarea id="srctext" rows="4" placeholder="영상에 담을 내용, 직접 쓴 원고, 기사 본문, 제품 정보 등"></textarea>

    <label>소스 파일 업로드 (선택 — 이미지·영상은 장면 순서대로 화면에 사용, 음악은 배경음악)</label>
    <input type="file" id="files" multiple accept="image/*,video/*,audio/*">
    <div id="filelist" class="filelist"></div>

    <label>추가 요청사항 (선택)</label>
    <input type="text" id="extra" placeholder="예: 40대 대상, 차분한 톤으로">

    <button class="go" id="go" onclick="createJob()">영상 생성 시작</button>
  </div>

  <div id="jobs"></div>
</div>

<script>
let fmt = "long";

(async () => {
  const list = await (await fetch("/api/fonts")).json();
  document.getElementById("font").innerHTML =
    list.map(f => `<option value="${f.id}">${f.name}</option>`).join("");
})();
document.querySelectorAll("#fmt button").forEach(b => b.onclick = () => {
  fmt = b.dataset.v;
  document.querySelectorAll("#fmt button").forEach(x => x.classList.toggle("on", x === b));
});

const fileInput = document.getElementById("files");
fileInput.onchange = () => {
  const kinds = {image:"🖼 장면용", video:"🎞 장면용", audio:"🎵 배경음악"};
  document.getElementById("filelist").innerHTML = [...fileInput.files].map(f =>
    `<b>${esc(f.name)}</b> — ${kinds[f.type.split("/")[0]] || "?"} (${(f.size / 1048576).toFixed(1)}MB)`).join("<br>");
};

async function createJob() {
  const topic = document.getElementById("topic").value.trim();
  if (!topic) return alert("주제를 입력하세요");
  const fd = new FormData();
  fd.append("topic", topic);
  fd.append("format", fmt);
  fd.append("style", document.getElementById("style").value);
  fd.append("voice", document.getElementById("voice").value);
  fd.append("extra", document.getElementById("extra").value);
  fd.append("reference_urls", document.getElementById("refs").value);
  fd.append("source_text", document.getElementById("srctext").value);
  fd.append("font", document.getElementById("font").value);
  fd.append("caption_size", document.getElementById("capsize").value);
  fd.append("caption_style", document.getElementById("capstyle").value);
  fd.append("caption_color", document.getElementById("capcolor").value);
  for (const f of fileInput.files) fd.append("files", f);
  const btn = document.getElementById("go");
  btn.disabled = true;
  const r = await fetch("/api/jobs", {method:"POST", body: fd});
  btn.disabled = false;
  if (!r.ok) return alert((await r.json()).detail || "요청 실패");
  fileInput.value = "";
  document.getElementById("filelist").innerHTML = "";
  refresh();
}

async function doUpload(id) {
  const privacy = document.getElementById("pv-" + id).value;
  const title = document.getElementById("ti-" + id).value;
  const names = {private:"비공개", unlisted:"일부공개", public:"공개"};
  if (!confirm(`"${title}"\n공개 설정: ${names[privacy]}\n\nYouTube에 업로드할까요?`)) return;
  await fetch(`/api/jobs/${id}/upload`, {method:"POST", headers:{"Content-Type":"application/json"},
    body: JSON.stringify({title, privacy, description: document.getElementById("de-" + id).value})});
  refresh();
}

function jobCard(j) {
  const fmtName = j.params.format === "short" ? "숏폼" : "롱폼";
  const styleName = {realistic:"실사", documentary:"다큐", news:"뉴스클립", ranking:"랭킹", tutorial:"튜토리얼",
    infographic:"인포그래픽", cardnews:"카드뉴스", quote:"명언/감성"}[j.params.style] || j.params.style;
  let html = `<div class="card job"><h3>${esc(j.params.topic)}
    <span class="badge">${fmtName}</span><span class="badge">${styleName}</span></h3>`;
  if (j.status === "running")
    html += `<div class="bar"><i style="width:${j.progress}%"></i></div><div class="stage">⏳ ${esc(j.stage)} (${j.progress}%)</div>`;
  if (j.status === "error") html += `<div class="err">❌ ${esc(j.error || "")}</div>`;
  if (j.status === "done") {
    html += `<div class="stage" style="color:var(--ok)">✅ 영상 생성 완료
        <a class="link" href="/edit?job=${j.id}" style="margin-left:10px">✂️ 편집하기</a></div>
      <video controls preload="metadata" src="/api/jobs/${j.id}/video?t=${j.log.length}"></video>
      <div class="upbox">
        <label>업로드 제목</label><input type="text" id="ti-${j.id}" value="${esc(j.script?.title || "")}">
        <label>설명</label><textarea id="de-${j.id}" rows="3">${esc(j.script?.description || "")}</textarea>
        <div class="row" style="margin-top:12px; align-items:center">
          <div><select id="pv-${j.id}">
            <option value="private">비공개 (업로드 후 직접 공개)</option>
            <option value="unlisted">일부공개</option>
            <option value="public">공개</option>
          </select></div>
          <div>${uploadState(j)}</div>
        </div>
      </div>`;
  }
  html += `<div class="log">${j.log.slice(-8).map(esc).join("\n")}</div></div>`;
  return html;
}

function uploadState(j) {
  if (j.upload_status === "uploading") return `<span class="stage">⏳ YouTube 업로드 중...</span>`;
  if (j.upload_status === "uploaded") return `<a class="link" href="${j.youtube_url}" target="_blank">✅ 업로드 완료 — 영상 보기</a>`;
  const retry = j.upload_status === "upload_error" ? " (재시도)" : "";
  return `<button class="btn2" onclick="doUpload('${j.id}')">📤 YouTube 업로드${retry}</button>`;
}

const esc = s => String(s ?? "").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
let lastState = "";

async function refresh() {
  const jobs = await (await fetch("/api/jobs")).json();
  const state = JSON.stringify(jobs.map(j => [j.id, j.status, j.progress, j.stage, j.upload_status, j.log.length]));
  if (state !== lastState) {
    lastState = state;
    document.getElementById("jobs").innerHTML = jobs.map(jobCard).join("");
  }
}
refresh();
setInterval(refresh, 2000);
</script>
</body>
</html>
